<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<script>
			// Apply Telegram's palette before styles are loaded to avoid flashing the light theme.
			(() => {
				const launchParams = new URLSearchParams(location.hash.slice(1));
				const rawTheme = launchParams.get('tgWebAppThemeParams');
				if (!rawTheme) return;

				try {
					const theme = JSON.parse(rawTheme);
					for (const [name, value] of Object.entries(theme)) {
						if (!/^[a-z0-9_]+$/.test(name) || typeof value !== 'string') continue;
						document.documentElement.style.setProperty(
							`--tg-theme-${name.replaceAll('_', '-')}`,
							value,
						);
					}

					const background = theme.bg_color;
					if (typeof background !== 'string' || !/^#[\da-f]{6}$/i.test(background)) return;
					const red = Number.parseInt(background.slice(1, 3), 16);
					const green = Number.parseInt(background.slice(3, 5), 16);
					const blue = Number.parseInt(background.slice(5, 7), 16);
					const brightness = (red * 299 + green * 587 + blue * 114) / 1000;
					if (brightness < 128) {
						document.documentElement.style.colorScheme = 'dark';
					} else {
						document.documentElement.style.colorScheme = 'light';
					}
				} catch {
					// The SDK will handle malformed launch parameters after the app mounts.
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
