name: CI (PR)

on:
    pull_request:

concurrency:
    group: ci-pr-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    changes:
        runs-on: ubuntu-latest
        outputs:
            root: ${{ steps.filter.outputs.root }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  persist-credentials: false

            - name: Detect changed paths
              id: filter
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      root:
                        - 'main.ts'
                        - 'lib/**'
                        - 'scripts/**'
                        - 'drizzle/**'
                        - 'locales/**'
                        - 'deno.json'
                        - 'deno.lock'
                        - 'Dockerfile'
    root-checks:
        name: Root checks
        runs-on: ubuntu-latest
        needs: changes
        if: needs.changes.outputs.root == 'true'
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  persist-credentials: false

            - name: Setup Deno
              uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x

            - name: Typecheck
              run: deno check --allow-import main.ts

            - name: Lint
              run: deno lint

            - name: Test
              env:
                  AI_TOKEN: test
              run: deno test -A
