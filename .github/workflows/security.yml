name: Security

on:
    pull_request:
        paths:
            - 'Dockerfile'
            - 'deno.json'
            - 'deno.lock'
            - 'widget/deno.json'
            - 'widget/deno.lock'
            - '.github/workflows/**'
    push:
        branches:
            - main
    schedule:
        - cron: '0 3 * * *'

concurrency:
    group: security-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    security-events: write

jobs:
    dependency-review:
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - name: Dependency review
              uses: actions/dependency-review-action@v4

    secret-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    container-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Build Docker image
              run: docker build -t slusha-security:${{ github.sha }} .

            - name: Scan image with Trivy
              uses: aquasecurity/trivy-action@0.35.0
              with:
                  version: v0.69.3
                  image-ref: slusha-security:${{ github.sha }}
                  format: table
                  exit-code: '1'
                  ignore-unfixed: true
                  vuln-type: 'os,library'
                  severity: 'CRITICAL,HIGH'
