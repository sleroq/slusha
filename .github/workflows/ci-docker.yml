name: CI (Docker)

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t slusha-ci:${{ github.sha }} .
